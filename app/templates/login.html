<!DOCTYPE html>
<html>
<head>
  <title>Login – CI/CD Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 40px 48px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.35);
      text-align: center;
      width: 340px;
    }
    .login-card h2 { margin-bottom: 8px; font-size: 1.6rem; }
    .login-card p  { color: #ccc; font-size: 0.88rem; margin-bottom: 24px; }
    .login-card input {
      width: 100%;
      padding: 11px 14px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 0.95rem;
      margin-bottom: 16px;
      box-sizing: border-box;
    }
    .login-card button {
      width: 100%;
      padding: 11px;
      font-size: 1rem;
    }
    .error-msg {
      color: #ff6b6b;
      font-size: 0.85rem;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div style="font-size:2.5rem; margin-bottom:8px;">🚀</div>
    <h2>CI/CD Dashboard</h2>
    <p>Enter your username to continue</p>

    {% if error %}
      <div class="error-msg">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST">
      <input name="username" placeholder="Username" required autocomplete="off">
      <button type="submit">Login →</button>
    </form>
  </div>
</div>
</body>
</html>
